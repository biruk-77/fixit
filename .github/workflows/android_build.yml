name: Flutter Release Build

on:
  push:
    branches:
      - main  # runs on pushes to main
  workflow_dispatch:  # allows manual trigger from GitHub

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.13.0"  # Dart 3.8.1+ compatible

      # Step 3: Enable Flutter analytics opt-out (optional, cleaner logs)
      - name: Disable Flutter analytics
        run: flutter config --no-analytics

      # Step 4: Get dependencies
      - name: Flutter Pub Get
        run: flutter pub get

      # Step 5: Run tests (optional but recommended)
      - name: Flutter Test
        run: flutter test --coverage

      # Step 6: Build APK release
      - name: Build APK Release
        run: flutter build apk --release

      # Step 7: Upload artifact so you can download it from Actions
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
